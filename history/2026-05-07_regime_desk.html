<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Regime Desk</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5}
a{color:#58a6ff;text-decoration:none}
#topbar{position:sticky;top:0;z-index:100;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:16px;padding:0 20px;height:48px}
#topbar h1{font-size:15px;font-weight:700;color:#f0f6fc;white-space:nowrap}
#topbar nav{display:flex;gap:4px;flex-wrap:wrap}
#topbar nav a{padding:4px 10px;border-radius:6px;color:#8b949e;font-size:12px;transition:background .15s}
#topbar nav a:hover,#topbar nav a.active{background:#21262d;color:#f0f6fc}
#topbar .ts{margin-left:auto;color:#6e7681;font-size:11px;white-space:nowrap}
#regime-banner{background:#161b22;border-bottom:1px solid #30363d;padding:8px 20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.regime-label{font-size:13px;font-weight:700;color:#f0f6fc}
.stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.stat .val{font-size:14px;font-weight:600;color:#f0f6fc}
.stat .key{font-size:10px;color:#6e7681;text-transform:uppercase;letter-spacing:.5px}
.pill{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.pill.bull{background:#1a3a2a;color:#3fb950}
.pill.bear{background:#3a1a1a;color:#f85149}
.pill.neut{background:#1e2733;color:#58a6ff}
.pill.elev{background:#3a2a1a;color:#e3b341}
.pill.mod{background:#1e2733;color:#58a6ff}
.pill.low{background:#1a2a1a;color:#3fb950}
#main{padding:20px;max-width:1200px;margin:0 auto}
.view{display:none}
.view.active{display:block}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin-bottom:16px}
.card h2{font-size:14px;font-weight:700;color:#f0f6fc;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #30363d}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.tile{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;cursor:pointer;transition:border-color .15s}
.tile:hover{border-color:#58a6ff}
.tile h3{font-size:13px;font-weight:700;color:#f0f6fc;margin-bottom:8px}
.tile .sub{font-size:11px;color:#8b949e}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:6px 8px;color:#8b949e;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #30363d}
td{padding:7px 8px;border-bottom:1px solid #21262d}
tr:last-child td{border-bottom:none}
tr:hover td{background:#1c2128}
.bar-wrap{background:#21262d;border-radius:3px;height:6px;position:relative;width:80px}
.bar-fill{height:6px;border-radius:3px;background:#238636;position:absolute;left:0;top:0}
.dist-wrap{display:flex;align-items:center;gap:4px;font-size:11px;white-space:nowrap}
.dist-bar{background:#21262d;border-radius:2px;height:8px;position:relative;width:120px}
.dist-range{position:absolute;height:8px;border-radius:2px}
.dist-med{position:absolute;width:2px;height:8px;background:#f0f6fc}
.score-bar{display:inline-block;width:60px;height:6px;background:#21262d;border-radius:3px;vertical-align:middle;position:relative}
.score-fill{height:6px;border-radius:3px;position:absolute;left:0;top:0}
footer{text-align:center;padding:20px;color:#484f58;font-size:11px;border-top:1px solid #21262d;margin-top:24px}
@media(max-width:640px){.grid3{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>

  <h1>&#9642; Regime Desk</h1>

<div id="main">

<script>
(function(){
const S = window.SNAPSHOT;
const VIEWS = ["home","regime","sectors","stocks","themes","signals","risks","narrative","analog","methodology"];
const LABELS = ["Home","Regime","Sectors","Stocks","Themes","Signals","Risks","Narrative","Analog","Methodology"];

function pct(v){return (v>=0?"+":"")+((v||0)*100).toFixed(1)+"%"}
function fmt(v){return typeof v==="number"?((v>=0?"+":"")+v.toFixed(3)):v}
function pillClass(s){return s==="bullish"?"bull":s==="bearish"?"bear":s==="elevated"||s==="elev"?"elev":s==="moderate"||s==="mod"?"mod":"neut"}
function pill(s,label){return`<span class="pill ${pillClass(s)}">${label||s}</span>`}

// Topbar
const nav=document.getElementById("nav");
VIEWS.forEach((v,i)=>{const a=document.createElement("a");a.href="#"+v;a.textContent=LABELS[i];a.id="nav-"+v;nav.appendChild(a);});
document.getElementById("ts").textContent="Generated: "+S.generated;

// Banner
const spy=S.spy;
document.getElementById("regime-banner").innerHTML=`
  <span class="regime-label">${spy.regime||"Unknown"}</span>
  <div class="stat"><span class="val">${pct(spy.ret_5d)}</span><span class="key">SPY 5d</span></div>
  <div class="stat"><span class="val">${pct(spy.ret_20d)}</span><span class="key">SPY 20d</span></div>
  <div class="stat"><span class="val">${((spy.vol_20d||0)*100).toFixed(1)}%</span><span class="key">Vol 20d</span></div>
  <div class="stat"><span class="val">${pct(spy.drawdown_60d)}</span><span class="key">Drawdown 60d</span></div>
  <div class="stat"><span class="val">${((spy.breadth||0)*100).toFixed(0)}%</span><span class="key">Breadth</span></div>
  <div class="stat"><span class="val">${((spy.persistence||0)*100).toFixed(0)}%</span><span class="key">Persistence</span></div>
  <div class="stat">${pill(spy.reversal_risk>0.5?"elevated":spy.reversal_risk>0.3?"moderate":"low","Rev. Risk: "+(((spy.reversal_risk||0)*100).toFixed(0))+"%")}</div>`;

// Distribution visualizer
function distBar(p10,p25,p50,p75,p90){
  const lo=-0.20,hi=0.30,range=hi-lo;
  function pos(v){return Math.max(0,Math.min(100,((v-lo)/range)*100)).toFixed(1)+"%"}
  const left=pos(p25),width=(((p75-p25)/range)*100).toFixed(1)+"%",med=pos(p50);
  return`<div class="dist-wrap">
    <span style="color:#6e7681;width:36px;text-align:right">${(p10*100).toFixed(0)}%</span>
    <div class="dist-bar">
      <div class="dist-range" style="left:${pos(p10)};width:${(((p90-p10)/range)*100).toFixed(1)}%;background:#1a3a2a;border-radius:2px"></div>
      <div class="dist-range" style="left:${left};width:${width};background:#238636;border-radius:2px"></div>
      <div class="dist-med" style="left:${med}"></div>
    </div>
    <span style="color:#f0f6fc;width:36px">${(p90*100).toFixed(0)}%</span>
    <span style="color:#8b949e;margin-left:4px">p50: ${pct(p50)}</span>
  </div>`;
}

// HOME
function renderHome(){
  const top=S.sectors.slice(0,3);
  const tiles=VIEWS.slice(1).map((v,i)=>{
    const sec=S.sectors[0]||{};
    const descs=["SPY state & regime context","Sector expectations","Leading stocks","Thematic reads","Cross-asset backdrop","Risk axes & invalidations","Plain-English summary","Analog matches","System methodology"];
    return`<div class="tile" onclick="location.hash='#${v}'"><h3>${LABELS[i+1]}</h3><div class="sub">${descs[i]}</div></div>`;
  });
  return`<div class="card"><h2>Market Overview — ${S.generated}</h2>
    <p style="margin-bottom:12px;color:#8b949e">${S.narrative&&S.narrative.headline||""}</p>
    <div class="grid3">${tiles.join("")}</div>
  </div>
  <div class="card"><h2>Top Sectors</h2><table>
    <tr><th>Sector</th><th>Edge</th><th>Breadth</th><th>Stocks</th><th>Signal</th></tr>
    ${S.sectors.slice(0,6).map(s=>`<tr><td>${s.name}</td><td>${pct(s.edge)}</td>
    <td><div class="bar-wrap"><div class="bar-fill" style="width:${((s.breadth||0)*100).toFixed(0)}%"></div></div></td>
    <td>${s.stocks}</td><td>${pill(s.signal)}</td></tr>`).join("")}
  </table></div>
  <footer>Tendencies only — not investment advice. Analog matching finds historically similar days; it does not guarantee future outcomes.</footer>`;
}

// REGIME
function renderRegime(){
  return`<div class="card"><h2>Regime Analysis</h2>
  <table><tr><th>Metric</th><th>Value</th><th>Note</th></tr>
  <tr><td>Regime Label</td><td><strong>${spy.regime||"—"}</strong></td><td>Classified from SPY state vector</td></tr>
  <tr><td>5d Return</td><td>${pct(spy.ret_5d)}</td><td>Short-term momentum</td></tr>
  <tr><td>20d Return</td><td>${pct(spy.ret_20d)}</td><td>Medium-term trend</td></tr>
  <tr><td>20d Volatility</td><td>${((spy.vol_20d||0)*100).toFixed(2)}%</td><td>Daily realized vol (annualizes ~${((spy.vol_20d||0)*Math.sqrt(252)*100).toFixed(0)}%)</td></tr>
  <tr><td>60d Drawdown</td><td>${pct(spy.drawdown_60d)}</td><td>From 60-day rolling peak</td></tr>
  <tr><td>Breadth</td><td>${((spy.breadth||0)*100).toFixed(0)}%</td><td>Fraction of sectors with positive conditional edge</td></tr>
  <tr><td>Persistence</td><td>${((spy.persistence||0)*100).toFixed(0)}%</td><td>Fraction of analog regimes that continued for 20d+</td></tr>
  <tr><td>Reversal Risk</td><td>${((spy.reversal_risk||0)*100).toFixed(0)}%</td><td>Estimated probability of regime flip within 20d</td></tr>
  </table></div>
  <div class="card"><h2>Analog Context</h2><p style="color:#8b949e">${S.analog&&S.analog.regime_context||"—"}</p></div>
  <footer>Tendencies only — not investment advice.</footer>`;
}

// SECTORS
function renderSectors(){
  return`<div class="card"><h2>Sector Expectations (${S.sectors[0]&&S.sectors[0].horizon||"20d"} horizon)</h2>
  <p style="margin-bottom:12px;color:#8b949e">Sectors ranked by conditional edge — the excess return analog days showed versus the unconditional baseline.</p>
  <table><tr><th>Sector</th><th>Edge</th><th>Breadth</th><th>Stocks</th><th>Signal</th></tr>
  ${S.sectors.map(s=>`<tr><td>${s.name}</td><td style="color:${s.edge>=0?"#3fb950":"#f85149"}">${pct(s.edge)}</td>
  <td><div class="bar-wrap"><div class="bar-fill" style="width:${((s.breadth||0)*100).toFixed(0)}%;background:${s.edge>=0?"#238636":"#b91c1c"}"></div></div></td>
  <td>${s.stocks}</td><td>${pill(s.signal)}</td></tr>`).join("")}
  </table></div>
  <footer>Tendencies only — not investment advice.</footer>`;
}

// STOCKS
function renderStocks(){
  return`<div class="card"><h2>Individual Stock Signals</h2>
  <p style="margin-bottom:12px;color:#8b949e">Stocks within leading sectors with the highest conditional edge. Distribution shows analog returns at each percentile.</p>
  <table><tr><th>Ticker</th><th>Name</th><th>Sector</th><th>Edge</th><th>Distribution (p10→p90)</th><th>Hit Rate</th><th>n</th></tr>
  ${S.stocks.map(st=>`<tr><td><strong>${st.ticker}</strong></td><td>${st.name||"—"}</td><td>${st.sector}</td>
  <td style="color:${st.edge>=0?"#3fb950":"#f85149"}">${pct(st.edge)}</td>
  <td>${distBar(st.p10,st.p25,st.p50,st.p75,st.p90)}</td>
  <td>${((st.hit_rate||0)*100).toFixed(0)}%</td><td>${st.n_obs}</td></tr>`).join("")}
  </table></div>
  <footer>Tendencies only — not investment advice. Hit rate = fraction of analog returns that were positive.</footer>`;
}

// THEMES
function renderThemes(){
  return`<div class="card"><h2>Thematic Reads</h2>
  <p style="margin-bottom:12px;color:#8b949e">Cross-sector themes aggregated from sector and stock signals.</p>
  ${S.themes.map(t=>`<div style="border:1px solid #30363d;border-radius:6px;padding:12px;margin-bottom:10px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <strong>${t.name}</strong>${pill(t.signal)}
      <span style="color:#8b949e;font-size:12px">${t.stocks} stocks · Edge ${pct(t.edge)}</span>
    </div>
    <div style="color:#8b949e;font-size:12px;margin-bottom:4px">Sectors: ${(t.sectors||[]).join(", ")}</div>
    <div style="color:#c9d1d9;font-size:13px">${t.note||""}</div>
  </div>`).join("")}
  </div>
  <footer>Tendencies only — not investment advice.</footer>`;
}

// SIGNALS
function renderSignals(){
  return`<div class="card"><h2>Cross-Asset Signals</h2>
  <table><tr><th>Asset</th><th>Ticker</th><th>Value</th><th>Signal</th><th>Context</th></tr>
  ${S.signals.map(s=>`<tr><td>${s.name}</td><td style="font-family:monospace">${s.asset}</td>
  <td>${s.value}</td><td>${pill(s.signal)}</td><td style="color:#8b949e">${s.context}</td></tr>`).join("")}
  </table></div>
  <footer>Tendencies only — not investment advice.</footer>`;
}

// RISKS
function renderRisks(){
  function scoreBar(v){const pct=Math.max(0,Math.min(100,(v||0)*100));const col=pct>=65?"#f85149":pct>=45?"#e3b341":"#3fb950";
    return`<span class="score-bar"><span class="score-fill" style="width:${pct}%;background:${col}"></span></span> ${(pct).toFixed(0)}%`;}
  return`<div class="card"><h2>Risk Axes & Invalidation Levels</h2>
  <p style="margin-bottom:12px;color:#8b949e">Each risk axis has an associated invalidation condition — the signal that would indicate the risk has materialized.</p>
  ${S.risks.map(r=>`<div style="border:1px solid #30363d;border-radius:6px;padding:12px;margin-bottom:10px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <strong>${r.name}</strong>${pill(r.level)} ${scoreBar(r.score)}
    </div>
    <div style="margin-bottom:4px">${r.description}</div>
    <div style="color:#6e7681;font-size:12px">Invalidation: ${r.invalidation}</div>
  </div>`).join("")}
  </div>
  <footer>Tendencies only — not investment advice.</footer>`;
}

// NARRATIVE
function renderNarrative(){
  const n=S.narrative||{};
  return`<div class="card"><h2>Plain-English Summary</h2>
  <div style="font-size:16px;font-weight:700;color:#f0f6fc;margin-bottom:12px">${n.headline||""}</div>
  <div class="grid2">
    <div style="background:#0d2818;border:1px solid #238636;border-radius:6px;padding:14px">
      <div style="color:#3fb950;font-weight:700;margin-bottom:8px">Constructive Read</div>
      <div>${n.constructive||"—"}</div>
    </div>
    <div style="background:#2d1515;border:1px solid #b91c1c;border-radius:6px;padding:14px">
      <div style="color:#f85149;font-weight:700;margin-bottom:8px">Risk / Reversal</div>
      <div>${n.risk||"—"}</div>
    </div>
  </div>
  <div style="margin-top:16px;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:14px">
    <div style="color:#8b949e;font-weight:700;margin-bottom:8px">In Plain English</div>
    <div>${n.plain_english||"—"}</div>
  </div>
  </div>
  <footer>Tendencies only — not investment advice.</footer>`;
}

// ANALOG
function renderAnalog(){
  const a=S.analog||{};
  return`<div class="card"><h2>Analog Matching</h2>
  <p style="margin-bottom:12px;color:#8b949e">Found ${a.n_days||30} historical days most similar to today's SPY state (excluding last ${a.exclude_recent||30} days).</p>
  <div style="margin-bottom:16px">
    <div style="color:#8b949e;font-size:12px;margin-bottom:6px">SPY Forward 20d Return Distribution across analog days</div>
    ${distBar(a.spy_p10||0,a.spy_p25||0,a.spy_p50||0,a.spy_p75||0,a.spy_p90||0)}
  </div>
  ${a.top_dates&&a.top_dates.length?`<div class="card" style="margin:0"><h2>Top Analog Dates</h2>
  <table><tr><th>#</th><th>Date</th></tr>
  ${a.top_dates.slice(0,10).map((d,i)=>`<tr><td>${i+1}</td><td>${d}</td></tr>`).join("")}
  </table></div>`:""}
  <div style="margin-top:12px;color:#8b949e;font-size:13px">${a.regime_context||""}</div>
  </div>
  <footer>Tendencies only — not investment advice.</footer>`;
}

// METHODOLOGY
function renderMethodology(){
  return`<div class="card"><h2>How This Works</h2>
  <div style="line-height:1.8">
  <p style="margin-bottom:12px"><strong>Step 1 — State Vector:</strong> We compute today's SPY state as a 4-dimensional vector: 5-day return, 20-day return, 20-day realized volatility, and 60-day drawdown.</p>
  <p style="margin-bottom:12px"><strong>Step 2 — Analog Matching:</strong> We normalize each dimension by its historical mean and standard deviation, then find the 30 historical trading days with the smallest Euclidean distance to today's state. Recent days (last 30) are excluded to avoid look-ahead.</p>
  <p style="margin-bottom:12px"><strong>Step 3 — Conditional Returns:</strong> For each stock, we measure the forward return (5d, 20d, 60d, 120d) following each analog date. The result is a distribution — not a point estimate.</p>
  <p style="margin-bottom:12px"><strong>Step 4 — Edge Calculation:</strong> <code>edge = conditional median return − unconditional baseline return</code>. Only signals with edge &gt; 5% and at least 5 analog observations are included.</p>
  <p style="margin-bottom:12px"><strong>Volatility Filter:</strong> Stocks with 20-day realized vol above 5%/day are excluded (too unstable for reliable analog matching).</p>
  <p><strong>What This Is Not:</strong> This is not a forecast. It is a tendencies report — a summary of what historically happened in similar conditions. Markets are non-stationary; past analogs do not guarantee future outcomes.</p>
  </div>
  </div>
  <footer>Tendencies only — not investment advice.</footer>`;
}

const renderers={home:renderHome,regime:renderRegime,sectors:renderSectors,stocks:renderStocks,themes:renderThemes,signals:renderSignals,risks:renderRisks,narrative:renderNarrative,analog:renderAnalog,methodology:renderMethodology};

function route(){
  const hash=(location.hash||"#home").replace("#","");
  const view=VIEWS.includes(hash)?hash:"home";
  VIEWS.forEach(v=>{
    document.getElementById("v-"+v).classList.toggle("active",v===view);
    const a=document.getElementById("nav-"+v);
    if(a)a.classList.toggle("active",v===view);
  });
  const el=document.getElementById("v-"+view);
  if(!el.dataset.rendered){el.innerHTML=renderers[view]();el.dataset.rendered="1";}
}

window.addEventListener("hashchange",route);
route();
})();
</script>
