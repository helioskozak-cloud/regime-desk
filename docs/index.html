<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Regime Desk</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5}
a{color:#58a6ff;text-decoration:none}
#topbar{position:sticky;top:0;z-index:100;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:16px;padding:0 20px;height:48px}
#topbar h1{font-size:15px;font-weight:700;color:#f0f6fc;white-space:nowrap}
#topbar nav{display:flex;gap:4px;flex-wrap:wrap}
#topbar nav a{padding:4px 10px;border-radius:6px;color:#8b949e;font-size:12px;transition:background .15s}
#topbar nav a:hover,#topbar nav a.active{background:#21262d;color:#f0f6fc}
#topbar .ts{margin-left:auto;color:#6e7681;font-size:11px;white-space:nowrap}
#regime-banner{background:#161b22;border-bottom:1px solid #30363d;padding:8px 20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.regime-label{font-size:13px;font-weight:700;color:#f0f6fc}
.stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.stat .val{font-size:14px;font-weight:600;color:#f0f6fc}
.stat .key{font-size:10px;color:#6e7681;text-transform:uppercase;letter-spacing:.5px}
.pill{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.pill.bull{background:#1a3a2a;color:#3fb950}
.pill.bear{background:#3a1a1a;color:#f85149}
.pill.neut{background:#1e2733;color:#58a6ff}
.pill.elev{background:#3a2a1a;color:#e3b341}
.pill.mod{background:#1e2733;color:#58a6ff}
.pill.low{background:#1a2a1a;color:#3fb950}
#main{padding:20px;max-width:1200px;margin:0 auto}
.view{display:none}
.view.active{display:block}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin-bottom:16px}
.card h2{font-size:14px;font-weight:700;color:#f0f6fc;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #30363d}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.tile{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;cursor:pointer;transition:border-color .15s}
.tile:hover{border-color:#58a6ff}
.tile h3{font-size:13px;font-weight:700;color:#f0f6fc;margin-bottom:8px}
.tile .sub{font-size:11px;color:#8b949e}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:6px 8px;color:#8b949e;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #30363d}
td{padding:7px 8px;border-bottom:1px solid #21262d}
tr:last-child td{border-bottom:none}
tr:hover td{background:#1c2128}
.bar-wrap{background:#21262d;border-radius:3px;height:6px;position:relative;width:80px}
.bar-fill{height:6px;border-radius:3px;background:#238636;position:absolute;left:0;top:0}
.dist-bar{background:#21262d;border-radius:2px;height:10px;position:relative}
.dist-range{position:absolute;height:10px;border-radius:2px}
.dist-med{position:absolute;width:2px;height:10px;background:#f0f6fc}
.score-bar{display:inline-block;width:60px;height:6px;background:#21262d;border-radius:3px;vertical-align:middle;position:relative}
.score-fill{height:6px;border-radius:3px;position:absolute;left:0;top:0}
footer{text-align:center;padding:20px;color:#484f58;font-size:11px;border-top:1px solid #21262d;margin-top:24px}
@media(max-width:640px){.grid3{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}}
html.light body{background:#ffffff;color:#1f2328}
html.light #topbar,html.light #regime-banner{background:#f6f8fa;border-color:#d0d7de}
html.light #topbar nav a{color:#57606a}
html.light #topbar nav a:hover,html.light #topbar nav a.active{background:#eaeef2;color:#1f2328}
html.light .card{background:#f6f8fa;border-color:#d0d7de}
html.light .tile{background:#f6f8fa;border-color:#d0d7de}
html.light .tile:hover{border-color:#0969da}
html.light td{border-color:#eaeef2}
html.light tr:hover td{background:#eaeef2}
html.light .bar-wrap,.light .dist-bar,.light .score-bar{background:#eaeef2}
html.light .pill.bull{background:#d1fae5;color:#166534}
html.light .pill.bear{background:#fee2e2;color:#991b1b}
html.light .pill.neut{background:#dbeafe;color:#1d4ed8}
html.light .pill.elev{background:#fef3c7;color:#92400e}
html.light .pill.mod{background:#dbeafe;color:#1d4ed8}
html.light .pill.low{background:#d1fae5;color:#166534}
html.light footer{color:#57606a;border-color:#d0d7de}
#rd-tip{position:fixed;z-index:9999;background:#1c2128;border:1px solid #30363d;border-radius:8px;padding:10px 14px;pointer-events:none;display:none;min-width:220px;max-width:270px;box-shadow:0 8px 32px rgba(0,0,0,.6);font-size:12px;line-height:1.4}
#rd-tip.show{display:block}
.rd-chip{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:4px 12px;border-radius:14px;cursor:pointer;font-size:12px;margin:3px;transition:border-color .15s,color .15s}
.rd-chip:hover{border-color:#58a6ff;color:#f0f6fc}
.rd-dot{width:7px;height:7px;border-radius:50%;background:#58a6ff;display:inline-block;animation:rdpulse 1.1s ease-in-out infinite}
@keyframes rdpulse{0%,80%,100%{opacity:.2;transform:scale(.85)}40%{opacity:1;transform:scale(1.1)}}
@media print{
  #topbar nav,#topbar button,#topbar .ts{display:none!important}
  #topbar{position:static;background:#fff!important;border-color:#ccc!important}
  #regime-banner{background:#fff!important;border-color:#ccc!important}
  body{background:#fff!important;color:#000!important}
  .card{background:#fff!important;border-color:#ccc!important;break-inside:avoid}
  .card h2,.regime-label,.stat .val,strong{color:#000!important}
  .stat .key,footer,td{color:#333!important}
  footer{border-color:#ccc!important}
  .tile{background:#fff!important;border-color:#ccc!important}
}
</style>

// Sparkline helper
function sparkline(history,key,w=40,h=14){
  if(!history||history.length<2) return '';
  const vals=history.map(d=>d[key]||0);
  const mn=Math.min(...vals),mx=Math.max(...vals),range=mx-mn||0.001;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1)*w).toFixed(1)},${(h-(v-mn)/range*h).toFixed(1)}`).join(' ');
  const col=vals[vals.length-1]>=0?'#3fb950':'#f85149';
  return`<svg width="${w}" height="${h}" style="vertical-align:middle;margin-left:4px;opacity:.8"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
}

// Distribution — SVG box-and-whisker: whisker p10→p90, box p25→p75, median line, zero ref
function distBar(p10,p25,p50,p75,p90){
  var lo=-0.20,hi=0.30,span=hi-lo;
  var W=154,pad=10,aw=W-2*pad;
  function px(v){return pad+Math.max(0,Math.min(aw,((v-lo)/span)*aw));}
  function fmt(v){return (v>=0?'+':'')+(v*100).toFixed(0)+'%';}
  var boxCol=p50>=0?'#238636':'#cf222e';
  var x10=px(p10),x25=px(p25),x50=px(p50),x75=px(p75),x90=px(p90);
  var zx=px(0);
  var bw=Math.max(3,x75-x25);
  return '<svg width="'+W+'" height="38" viewBox="0 0 '+W+' 38" style="display:block;overflow:visible">'
    // Zero reference — dashed
    +'<line x1="'+zx.toFixed(1)+'" y1="2" x2="'+zx.toFixed(1)+'" y2="26" stroke="rgba(240,246,252,0.2)" stroke-width="1" stroke-dasharray="2,2"/>'
    // Whisker line
    +'<line x1="'+x10.toFixed(1)+'" y1="14" x2="'+x90.toFixed(1)+'" y2="14" stroke="#484f58" stroke-width="1.5" stroke-linecap="round"/>'
    // Whisker caps
    +'<line x1="'+x10.toFixed(1)+'" y1="9" x2="'+x10.toFixed(1)+'" y2="19" stroke="#6e7681" stroke-width="1.5"/>'
    +'<line x1="'+x90.toFixed(1)+'" y1="9" x2="'+x90.toFixed(1)+'" y2="19" stroke="#6e7681" stroke-width="1.5"/>'
    // IQR box p25–p75
    +'<rect x="'+x25.toFixed(1)+'" y="7" width="'+bw.toFixed(1)+'" height="14" fill="'+boxCol+'" rx="2" opacity="0.9"/>'
    // Median line
    +'<line x1="'+x50.toFixed(1)+'" y1="5" x2="'+x50.toFixed(1)+'" y2="23" stroke="#f0f6fc" stroke-width="2" stroke-linecap="round"/>'
    // Labels
    +'<text x="'+x10.toFixed(1)+'" y="36" text-anchor="middle" fill="#6e7681" font-size="9" font-family="system-ui,sans-serif">'+fmt(p10)+'</text>'
    +'<text x="'+x50.toFixed(1)+'" y="36" text-anchor="middle" fill="#c9d1d9" font-size="9" font-family="system-ui,sans-serif" font-weight="600">'+fmt(p50)+'</text>'
    +'<text x="'+x90.toFixed(1)+'" y="36" text-anchor="middle" fill="#6e7681" font-size="9" font-family="system-ui,sans-serif">'+fmt(p90)+'</text>'
    +'</svg>';
}

function _sectorData(){
  if(_horizon==='all') return S.sectors;
  const filtered=S.stocks.filter(s=>s.horizon===_horizon);
  if(!filtered.length) return S.sectors;
  const map={};
  filtered.forEach(s=>{
    if(!map[s.sector])map[s.sector]={edges:[],stocks:0};
    map[s.sector].edges.push(s.edge);map[s.sector].stocks++;
  });
  return Object.entries(map).map(([name,d])=>{
    const avg=d.edges.reduce((a,b)=>a+b,0)/d.edges.length;
    const breadth=d.edges.filter(e=>e>0).length/d.edges.length;
    return{name,edge:avg,breadth,stocks:d.stocks,signal:avg>0.03?'bullish':avg<-0.01?'bearish':'neutral',horizon:_horizon};
  }).sort((a,b)=>b.edge-a.edge);
}

var RD_API_PORT=7534;
var RD_CLOUD_API='https://regime-desk.onrender.com';
function _rdGetApiBase(){
  return fetch('http://localhost:'+RD_API_PORT+'/api/ping',{signal:AbortSignal.timeout(800)})
    .then(function(r){return r.ok?'http://localhost:'+RD_API_PORT:null;})
    .catch(function(){return null;})
    .then(function(base){return base||(RD_CLOUD_API||null);});
}
function _rdFetchTicker(tk){
  var msgEl=document.getElementById('rd-pin-msg-'+tk);
  _rdGetApiBase().then(function(base){
    if(!base){
      if(msgEl)msgEl.innerHTML='<span style="color:#6e7681">No API available — run <code style="background:#21262d;padding:1px 4px;border-radius:3px">run_local_api.bat</code> or deploy the cloud API.</span>';
      return;
    }
    var isCloud=base!=='http://localhost:'+RD_API_PORT;
    if(msgEl&&isCloud)msgEl.innerHTML='<span style="color:#58a6ff;font-size:12px">Computing via cloud API (may take up to a minute if server just woke up)...</span>';
    fetch(base+'/api/ticker?t='+tk,{signal:AbortSignal.timeout(180000)})
      .then(function(r){return r.json();})
      .then(function(data){
        var el=document.getElementById('rd-pin-msg-'+tk);
        if(data.error){
          if(el)el.innerHTML='<span style="color:#6e7681">'+data.error+'</span>';
          return;
        }
        var idx=(S.all_signals||[]).findIndex(function(s){return s.ticker===tk;});
        if(idx===-1)(S.all_signals=S.all_signals||[]).push(data);
        else S.all_signals[idx]=data;
        _rdRefreshPinned();
      })
      .catch(function(){
        var el=document.getElementById('rd-pin-msg-'+tk);
        if(el)el.innerHTML='<span style="color:#6e7681">Request timed out — try again.</span>';
      });
  });
}

  const wlTickers=_watchlist.split(',').map(t=>t.trim().toUpperCase()).filter(Boolean);
  const isWl=wlTickers.length>0;
  // Watchlist filter first, then horizon filter
  let pool=isWl?S.stocks.filter(s=>wlTickers.includes(s.ticker)):S.stocks;
  if(_horizon!=='all') pool=pool.filter(s=>s.horizon===_horizon);
  const sorted=[...pool].sort((a,b)=>_sortDir*((a[_sortCol]||0)<(b[_sortCol]||0)?-1:(a[_sortCol]||0)>(b[_sortCol]||0)?1:0));
  function th(col,label){const active=_sortCol===col;return`<th onclick="window._rdSort('${col}')" style="cursor:pointer;user-select:none">${label}${active?(_sortDir>0?' ↑':' ↓'):''}</th>`;}
  function stRow(st){
    const hd={'5d':5,'20d':20,'60d':60,'120d':120}[st.horizon]||20;
    const ann=(st.edge||0)*(252/hd);
    const rowBg=isWl?(st.edge>=0?'background:rgba(35,134,54,.08)':'background:rgba(248,81,73,.08)'):'';
    const logo=`<img src="https://assets.parqet.com/logos/symbol/${st.ticker}?format=jpg" width="18" height="18" style="border-radius:3px;object-fit:contain;vertical-align:middle;margin-right:5px;background:#fff;border:1px solid #30363d;flex-shrink:0" onerror="this.style.display='none'" loading="lazy">`;
    const sector=st.sector&&st.sector!=='Unknown'?st.sector:'—';
    return`<tr style="${rowBg}">
      <td><div style="display:flex;align-items:center" data-ticker="${st.ticker}">${logo}<div><strong>${st.ticker}</strong><div style="color:#6e7681;font-size:10px">${st.horizon}</div></div></div></td>
      <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${st.name||'—'}</td><td>${sector}</td>
      <td style="color:${st.edge>=0?'#3fb950':'#f85149'};white-space:nowrap">${pct(st.edge)} <span style="color:#6e7681;font-size:11px">(${pct(ann)})</span></td>
      <td style="color:#f85149;font-weight:600;white-space:nowrap">${pct(st.p10)}</td>
      <td style="color:#c9d1d9;font-weight:600;white-space:nowrap">${pct(st.p50)}</td>
      <td style="color:#3fb950;font-weight:600;white-space:nowrap">${pct(st.p90)}</td>
      <td>${((st.hit_rate||0)*100).toFixed(0)}%</td><td>${st.n_obs}</td>
      <td><button onclick="navigator.clipboard&&navigator.clipboard.writeText('${st.ticker} edge:${pct(st.edge)} p50:${pct(st.p50)}')" style="background:none;border:1px solid #30363d;color:#8b949e;padding:2px 5px;border-radius:4px;cursor:pointer;font-size:11px" title="Copy">&#x1F4CB;</button></td>
    </tr>`;
  }
  // In watchlist mode, iterate requested tickers in order; show "no data" for missing ones
  const rows=isWl
    ?wlTickers.map(tk=>{const st=pool.find(s=>s.ticker===tk);return st?stRow(st):`<tr><td><strong>${tk}</strong></td><td colspan="9" style="color:#6e7681;font-size:12px;font-style:italic">No signal data available</td></tr>`;})
    :sorted.map(stRow);
  const wlBar=`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">
    <span style="color:#8b949e;font-size:12px">Watchlist:</span>
    <input type="text" value="${_watchlist}" placeholder="AAPL,MSFT,NVDA…"
      style="background:#21262d;border:1px solid ${isWl?'#58a6ff':'#30363d'};color:#f0f6fc;padding:4px 10px;border-radius:6px;font-size:12px;width:220px"
      oninput="window._rdWl(this.value)"/>
    ${isWl?`<span style="font-size:11px;color:#58a6ff">${pool.length}/${wlTickers.length} matched</span><button onclick="window._rdWl('')" style="background:none;border:1px solid #30363d;color:#8b949e;padding:3px 8px;border-radius:6px;cursor:pointer;font-size:11px">Clear</button>`:'<span style="color:#6e7681;font-size:11px">paste tickers to filter to client holdings</span>'}
  </div>`;
  const lookupBar='<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">'
    +'<span style="color:#8b949e;font-size:12px;white-space:nowrap">Ticker lookup:</span>'
    +'<input id="rd-lookup-input" type="text" placeholder="e.g. AAPL" maxlength="8" '
    +'style="background:#21262d;border:1px solid #30363d;color:#f0f6fc;padding:4px 10px;border-radius:6px;font-size:12px;width:110px;text-transform:uppercase" '
    +'oninput="this.value=this.value.toUpperCase()" '
    +'onkeydown="if(event.key===\'Enter\'){window._rdPinTicker(this.value);this.value=\'\'}" '
    +'onfocus="this.style.borderColor=\'#58a6ff\'" onblur="this.style.borderColor=\'#30363d\'"/>'
    +'<button onclick="var i=document.getElementById(\'rd-lookup-input\');window._rdPinTicker(i.value);i.value=\'\'" '
    +'style="background:#238636;border:none;color:#fff;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">Pin</button>'
    +(_pinnedTickers.length?'<button onclick="window._rdClearPinned()" style="background:none;border:1px solid #30363d;color:#6e7681;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:11px">Clear all</button>':'')
    +'<span style="color:#6e7681;font-size:11px">Pin a ticker to see its full signal card above the table</span>'
    +'</div>';
  return`<div class="card"><h2>Individual Stock Signals</h2>
  ${_horizonBar()}${wlBar}${lookupBar}
  <div id="rd-pinned-cards"></div>
  <p style="margin-bottom:12px;color:#8b949e">${isWl?`Watchlist mode — ${wlTickers.length} ticker${wlTickers.length!==1?'s':''}. `:''}${!isWl?sorted.length+' signals shown':''}.${_horizon!=='all'?' Horizon: '+_horizon+'.':''} Click headers to sort.</p>
  <div style="overflow-x:auto"><table style="min-width:640px"><tr>${th('ticker','Ticker')}${th('name','Name')}${th('sector','Sector')}${th('edge','Edge')}<th>Bear Case</th><th>Median</th><th>Bull Case</th>${th('hit_rate','Hit %')}${th('n_obs','n')}<th></th></tr>
  ${rows.join('')}
  </table></div></div>
  <footer>Tendencies only — not investment advice. Green/red row tint = positive/negative edge in watchlist mode.</footer>`;
}
window._rdSort=function(col){
  if(_sortCol===col)_sortDir*=-1;else{_sortCol=col;_sortDir=col==='ticker'||col==='name'||col==='sector'?1:-1;}
  const el=document.getElementById('v-stocks');
  delete el.dataset.rendered;el.innerHTML=renderStocks();el.dataset.rendered='1';
  _rdRefreshPinned();
};
window._rdHorizon=function(h){
  _horizon=h;
  const map={stocks:renderStocks,sectors:renderSectors,themes:renderThemes};
  Object.keys(map).forEach(function(v){
    const el=document.getElementById('v-'+v);
    if(el&&el.dataset.rendered){delete el.dataset.rendered;el.innerHTML=map[v]();el.dataset.rendered='1';}
  });
  _rdRefreshPinned();
};

// THEMES
window._rdThemeToggle=function(i){
  var body=document.getElementById('rd-tb-'+i);
  var chev=document.getElementById('rd-tc-'+i);
  if(!body)return;
  var open=body.style.display!=='none';
  body.style.display=open?'none':'';
  if(chev)chev.style.transform=open?'':'rotate(90deg)';
};
function renderThemes(){
  const THEME_ICON={'Technology':'&#x25FC;','Semiconductors':'&#x2BC0;','Healthcare':'&#x2B22;','Financials':'&#x25B6;','Consumer Discretionary':'&#x25C6;','Communication Services':'&#x25CB;','Industrials':'&#x25A0;','Consumer Staples':'&#x25BD;','Energy':'&#x26A1;','Utilities':'&#x25D1;','Real Estate':'&#x25A3;','Materials':'&#x2B21;','Biotech':'&#x2B2C;','Defense':'&#x25B2;','Crypto':'&#x25C9;','Energy Transition':'&#x2600;'};
  const themes=(S.themes||[]).filter(function(t){return t.name&&t.name!=='Unknown';});
  let pool=S.stocks||[];
  if(_horizon!=='all')pool=pool.filter(function(s){return s.horizon===_horizon;});
  function _med(arr){if(!arr.length)return null;var s=[].concat(arr).sort(function(a,b){return a-b;});return s[Math.floor(s.length/2)];}
  const TH='<th style="text-align:left;padding:0 10px 6px;font-weight:500;white-space:nowrap">';
  const cards=themes.map(function(t,i){
    const stocks=pool.filter(function(st){return st.sector===t.name;}).sort(function(a,b){return b.edge-a.edge;}).slice(0,15);
    const tCol=t.edge>=0?'#3fb950':'#f85149';
    const icon=THEME_ICON[t.name]||'&#x25A1;';
    const tp10=_med(stocks.map(function(s){return s.p10;}).filter(function(v){return v!=null;}));
    const tp50=_med(stocks.map(function(s){return s.p50;}).filter(function(v){return v!=null;}));
    const tp90=_med(stocks.map(function(s){return s.p90;}).filter(function(v){return v!=null;}));
    const rows=stocks.map(function(st){
      const ec=st.edge>=0?'#3fb950':'#f85149';
      const logo='<img src="https://assets.parqet.com/logos/symbol/'+st.ticker+'?format=jpg" width="14" height="14" '
        +'style="border-radius:3px;object-fit:contain;background:#fff;border:1px solid #30363d;flex-shrink:0;vertical-align:middle;margin-right:5px" '
        +'onerror="this.style.display=\'none\'" loading="lazy">';
      return '<tr style="border-top:1px solid #30363d40">'
        +'<td style="padding:5px 10px;white-space:nowrap"><div style="display:inline-flex;align-items:center" data-ticker="'+st.ticker+'">'+logo+'<strong style="font-size:12px">'+st.ticker+'</strong></div></td>'
        +'<td style="padding:5px 10px;color:'+ec+';font-weight:700;font-size:12px;white-space:nowrap">'+(st.edge>=0?'+':'')+(st.edge*100).toFixed(1)+'%</td>'
        +'<td style="padding:5px 10px;color:#f85149;font-size:12px;white-space:nowrap">'+(st.p10!=null?(st.p10>=0?'+':'')+(st.p10*100).toFixed(0)+'%':'—')+'</td>'
        +'<td style="padding:5px 10px;color:#c9d1d9;font-size:12px;white-space:nowrap">'+(st.p50!=null?(st.p50>=0?'+':'')+(st.p50*100).toFixed(0)+'%':'—')+'</td>'
        +'<td style="padding:5px 10px;color:#3fb950;font-size:12px;white-space:nowrap">'+(st.p90!=null?(st.p90>=0?'+':'')+(st.p90*100).toFixed(0)+'%':'—')+'</td>'
        +'<td style="padding:5px 10px;color:#8b949e;font-size:11px;white-space:nowrap">'+((st.hit_rate||0)*100).toFixed(0)+'%</td>'
        +'</tr>';
    }).join('');
    const medianRow=tp50!=null
      ?'<tr style="border-top:1px solid #30363d;background:#1c2128">'
        +'<td style="padding:5px 10px;color:#6e7681;font-size:11px;font-style:italic">Theme median</td>'
        +'<td></td>'
        +'<td style="padding:5px 10px;color:#f85149;font-size:11px;font-weight:600">'+(tp10>=0?'+':'')+(tp10*100).toFixed(0)+'%</td>'
        +'<td style="padding:5px 10px;color:#c9d1d9;font-size:11px;font-weight:600">'+(tp50>=0?'+':'')+(tp50*100).toFixed(0)+'%</td>'
        +'<td style="padding:5px 10px;color:#3fb950;font-size:11px;font-weight:600">'+(tp90>=0?'+':'')+(tp90*100).toFixed(0)+'%</td>'
        +'<td></td></tr>'
      :'';
    const tableBody=stocks.length
      ?'<table style="width:100%;border-collapse:collapse;margin-top:10px">'
        +'<tr style="color:#6e7681;font-size:10px;text-transform:uppercase;letter-spacing:.5px">'
        +TH+'Ticker</th>'+TH+'Edge</th>'+TH+'Bear</th>'+TH+'Median</th>'+TH+'Bull</th>'+TH+'Hit%</th>'
        +'</tr>'
        +rows+medianRow
        +'</table>'
      :'<div style="color:#6e7681;font-size:12px;font-style:italic;padding-top:8px">No signals'+(_horizon!=='all'?' for '+_horizon:'')+'</div>';
    return '<div class="card" style="background:#21262d;border-left:3px solid '+tCol+';margin-bottom:10px;padding:14px">'
      +'<div onclick="window._rdThemeToggle('+i+')" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;cursor:pointer;user-select:none">'
      +'<span id="rd-tc-'+i+'" style="color:#6e7681;font-size:10px;display:inline-block;transition:transform .18s">&#x25B6;</span>'
      +'<span style="color:'+tCol+';font-size:15px;opacity:.85">'+icon+'</span>'
      +'<strong style="font-size:14px;color:#f0f6fc">'+t.name+'</strong>'+pill(t.signal)
      +'<span style="color:'+tCol+';font-weight:700;font-size:13px">'+(t.edge>=0?'+':'')+(t.edge*100).toFixed(1)+'%</span>'
      +'<span style="color:#8b949e;font-size:12px">&middot; '+stocks.length+' signal'+(stocks.length!==1?'s':'')+' &middot; breadth '+((t.breadth||0)*100).toFixed(0)+'%</span>'
      +'</div>'
      +'<div id="rd-tb-'+i+'" style="display:none">'
      +tableBody
      +(t.note?'<div style="color:#c9d1d9;font-size:12px;margin-top:10px">'+t.note+'</div>':'')
      +'</div>'
      +'</div>';
  }).join('');
  return '<div class="card"><h2>Thematic Reads</h2>'
    +_horizonBar()
    +'<p style="margin-bottom:12px;color:#8b949e">Click any theme to expand. Bear/Median/Bull are p10/p50/p90 forward returns.</p>'
    +cards+'</div>'
    +'<footer>Tendencies only — not investment advice.</footer>';
}

// RISKS
function renderRisks(){
  function scoreBar(v){const pct=Math.max(0,Math.min(100,(v||0)*100));const col=pct>=65?"#f85149":pct>=45?"#e3b341":"#3fb950";
    return`<span class="score-bar"><span class="score-fill" style="width:${pct}%;background:${col}"></span></span> ${(pct).toFixed(0)}%`;}
  const scores=S.risks.map(r=>r.score||0);
  const composite=scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:0;
  const cPct=(composite*100).toFixed(0);
  const cLevel=composite>=0.65?"elevated":composite>=0.45?"moderate":"low";
  const cCol=composite>=0.65?"#f85149":composite>=0.45?"#e3b341":"#3fb950";
  const maxRisk=S.risks.reduce((a,b)=>(b.score||0)>(a.score||0)?b:a,S.risks[0]||{});
  return`<div class="card" style="border-left:4px solid ${cCol}"><h2>Aggregate Risk Score</h2>
  <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
    <div style="font-size:42px;font-weight:700;color:${cCol};line-height:1">${cPct}<span style="font-size:20px;color:#8b949e">/100</span></div>
    <div style="flex:1;min-width:200px">
      <div style="margin-bottom:6px">${pill(cLevel)} composite across ${S.risks.length} axes</div>
      <div style="background:#21262d;border-radius:4px;height:10px;position:relative;overflow:hidden">
        <div style="position:absolute;left:0;top:0;height:10px;width:${cPct}%;background:${cCol};border-radius:4px"></div>
      </div>
      <div style="color:#6e7681;font-size:12px;margin-top:6px">Top driver: <strong style="color:#c9d1d9">${maxRisk.name||"—"}</strong> (${((maxRisk.score||0)*100).toFixed(0)}%)</div>
    </div>
  </div>
  </div>
  <div class="card"><h2>Risk Axes & Invalidation Levels</h2>
  <p style="margin-bottom:12px;color:#8b949e">Each risk axis has an associated invalidation condition — the signal that would indicate the risk has materialized.</p>
  ${S.risks.map(r=>`<div style="border:1px solid #30363d;border-radius:6px;padding:12px;margin-bottom:10px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <strong>${r.name}</strong>${pill(r.level)} ${scoreBar(r.score)}
    </div>
    <div style="margin-bottom:4px">${r.description}</div>
    <div style="color:#6e7681;font-size:12px">Invalidation: ${r.invalidation}</div>
  </div>`).join("")}
  </div>
  <footer>Tendencies only — not investment advice.</footer>`;
}

      +'</div>'
    : '';

  return '<div class="card"><h2>Analog Matching</h2>'
    +'<div class="grid2" style="margin-bottom:16px">'
    +'<div style="background:#21262d;border-radius:6px;padding:12px">'
    +'<div style="color:#8b949e;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Analog Days Found</div>'
    +'<div style="font-size:28px;font-weight:700;color:#f0f6fc">'+(a.n_days||30)+'</div>'

    +'</div>'
    +'<div style="background:#21262d;border-radius:6px;padding:12px">'
    +'<div style="color:#8b949e;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Date Range</div>'
    +'<div style="font-size:13px;font-weight:600;color:#f0f6fc;margin-top:4px">'+dateRange+'</div>'

    +'</div>'

// METHODOLOGY — with jargon glossary
function renderMethodology(){
  const terms=[
    ["Edge","The conditional median forward return minus the unconditional baseline. Measures how much better (or worse) a stock historically performed in analog conditions versus any random day."],
    ["Analog","A historical trading day whose SPY state vector is closest to today's, measured by Euclidean distance after z-score normalization across all four dimensions."],
    ["Hit Rate","Fraction of analog forward returns that were positive. A hit rate of 0.65 means 65% of similar historical setups produced a positive return over the horizon."],
    ["Breadth","The fraction of stocks within a sector that have a positive conditional edge. High breadth = widespread sector participation, not just a few outliers."],
    ["Persistence","The fraction of historical analogs where the current regime label continued for at least 20 more trading days before flipping to a different regime."],
    ["Reversal Risk","Estimated probability the current regime label changes within 20 trading days, based on how frequently analogs transitioned quickly."],
    ["Distribution (p10–p90)","The range of forward returns observed across all analog days. p10 = adverse 10th percentile; p90 = favorable 90th percentile. p50 (the median) is the central tendency."],
  ];
  return`<div class="card"><h2>How This Works</h2>
  <div style="line-height:1.8">
  <p style="margin-bottom:12px"><strong>Step 1 — State Vector:</strong> We compute today's SPY state as a 4-dimensional vector: 5-day return, 20-day return, 20-day realized volatility, and 60-day drawdown.</p>
  <p style="margin-bottom:12px"><strong>Step 2 — Analog Matching:</strong> We normalize each dimension by its historical mean and standard deviation, then find the 30 historical trading days with the smallest Euclidean distance to today's state. Recent days (last 30) are excluded to avoid look-ahead.</p>
  <p style="margin-bottom:12px"><strong>Step 3 — Conditional Returns:</strong> For each stock, we measure the forward return (5d, 20d, 60d, 120d) following each analog date. The result is a distribution — not a point estimate.</p>
  <p style="margin-bottom:12px"><strong>Step 4 — Edge Calculation:</strong> <code>edge = conditional median return − unconditional baseline return</code>. Only signals with edge &gt; 5% and at least 5 analog observations are included.</p>
  <p style="margin-bottom:12px"><strong>Volatility Filter:</strong> Stocks with 20-day realized vol above 5%/day are excluded.</p>
  <p style="margin-bottom:16px"><strong>What This Is Not:</strong> This is a tendencies report — a summary of what historically happened in similar conditions. Markets are non-stationary; past analogs do not guarantee future outcomes.</p>
  </div></div>
  <details style="margin-bottom:16px">
    <summary style="cursor:pointer;padding:12px 16px;background:#161b22;border:1px solid #30363d;border-radius:8px;font-weight:700;color:#f0f6fc;list-style:none">&#9654; Jargon Glossary</summary>
    <div style="border:1px solid #30363d;border-top:none;border-radius:0 0 8px 8px;padding:16px;background:#161b22">
    ${terms.map(([t,d])=>`<div style="margin-bottom:12px"><strong style="color:#f0f6fc">${t}</strong><div style="color:#8b949e;margin-top:2px">${d}</div></div>`).join('')}
    </div>
  </details>
  <footer>Tendencies only — not investment advice.</footer>`;
}

function svgLineChart(vals, w, h, label) {
  if(!vals||vals.length<2) return `<div style="color:#6e7681;text-align:center;padding:20px;font-size:12px">No history data</div>`;
  const mn=Math.min(...vals,0), mx=Math.max(...vals,0.001), range=mx-mn||0.01;
  const pl=44,pr=54,pt=12,pb=20, pw=w-pl-pr, ph=h-pt-pb;
  const cx=i=>pl+i/(vals.length-1)*pw, cy=v=>pt+ph-(v-mn)/range*ph;
  const zY=cy(0);
  const pts=vals.map((v,i)=>`${cx(i).toFixed(1)},${cy(v).toFixed(1)}`).join(' ');
  const last=vals[vals.length-1], lc=last>=0?'#3fb950':'#f85149';
  const area=`${pl},${zY.toFixed(1)} ${pts} ${(pl+pw).toFixed(1)},${zY.toFixed(1)}`;
  const xLabels=[0,Math.floor((vals.length-1)/2),vals.length-1]
    .map((i,j)=>`<text x="${cx(i).toFixed(1)}" y="${pt+ph+14}" text-anchor="middle" font-size="9" fill="#6e7681">${['20d ago','10d ago','Today'][j]}</text>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px">
    <text x="${pl+pw/2}" y="9" text-anchor="middle" font-size="9" fill="#8b949e">${label}</text>
    <line x1="${pl}" y1="${zY.toFixed(1)}" x2="${pl+pw}" y2="${zY.toFixed(1)}" stroke="#30363d" stroke-dasharray="3,2"/>
    <polygon points="${area}" fill="${lc}" opacity="0.1"/>
    <polyline points="${pts}" fill="none" stroke="${lc}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${cx(vals.length-1).toFixed(1)}" cy="${cy(last).toFixed(1)}" r="4" fill="${lc}"/>
    <text x="${pl-4}" y="${cy(mx).toFixed(1)}" text-anchor="end" dominant-baseline="middle" font-size="9" fill="#6e7681">${(mx*100).toFixed(1)}%</text>
    <text x="${pl-4}" y="${cy(mn).toFixed(1)}" text-anchor="end" dominant-baseline="middle" font-size="9" fill="#6e7681">${(mn*100).toFixed(1)}%</text>
    <text x="${(pl+pw+6).toFixed(1)}" y="${cy(last).toFixed(1)}" dominant-baseline="middle" font-size="11" font-weight="600" fill="${lc}">${(last*100>=0?'+':'')+(last*100).toFixed(1)}%</text>
    ${xLabels}
  </svg>`;
}

function svgSectorBars(sectors) {
  const FACTOR={'Technology':'Growth','Semiconductors':'Growth','Healthcare':'Quality',
    'Financials':'Value','Consumer Discretionary':'Cyclical','Communication Services':'Growth',
    'Industrials':'Cyclical','Consumer Staples':'Defensive','Energy':'Value',
    'Utilities':'Defensive','Real Estate':'Income','Materials':'Cyclical',
    'Biotech':'Speculative','Defense':'Defensive','Crypto':'Speculative'};
  const FCOL={'Growth':'#58a6ff','Value':'#e3b341','Quality':'#3fb950','Cyclical':'#f0883e',
    'Defensive':'#8b949e','Income':'#a371f7','Speculative':'#f85149','—':'#6e7681'};
  const n=sectors.length, maxAbs=Math.max(...sectors.map(s=>Math.abs(s.edge)),0.05);
  const barH=24, pl=160, pr=64, pt=20, pb=4, w=640, pw=w-pl-pr, h=n*barH+pt+pb;
  const midX=pl+pw/2;
  const header=`<text x="${midX}" y="12" text-anchor="middle" font-size="9" fill="#6e7681">← Underperform  |  Outperform →</text>
    <line x1="${midX}" y1="${pt}" x2="${midX}" y2="${h-pb}" stroke="#30363d"/>`;
  const rows=sectors.map((s,i)=>{
    const y=pt+i*barH, bw=(Math.abs(s.edge)/maxAbs)*(pw/2);
    const bx=s.edge>=0?midX:midX-bw, col=s.edge>=0?'#238636':'#b91c1c';
    const badge=i<3?'🏆':i>=n-3?'⚠️':'';
    const factor=FACTOR[s.name]||'—', fc=FCOL[factor]||'#6e7681';
    const valX=(s.edge>=0?midX+bw+4:midX-bw-4).toFixed(1);
    const valAnchor=s.edge>=0?'start':'end';
    return `${badge?`<text x="${pl-152}" y="${y+barH/2}" dominant-baseline="middle" font-size="12">${badge}</text>`:''}
    <rect x="${(pl-144)}" y="${y+5}" width="52" height="${barH-10}" fill="${fc}18" rx="3" stroke="${fc}" stroke-width="0.5"/>
    <text x="${pl-118}" y="${y+barH/2}" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="${fc}">${factor}</text>
    <text x="${pl-8}" y="${y+barH/2}" text-anchor="end" dominant-baseline="middle" font-size="11" fill="#c9d1d9">${s.name}</text>
    <rect x="${bx.toFixed(1)}" y="${y+4}" width="${Math.max(bw,1).toFixed(1)}" height="${barH-8}" fill="${col}" rx="3" opacity="0.85"/>
    <text x="${valX}" y="${y+barH/2}" text-anchor="${valAnchor}" dominant-baseline="middle" font-size="10" fill="${s.edge>=0?'#3fb950':'#f85149'}">${(s.edge*100>=0?'+':'')+(s.edge*100).toFixed(1)}%</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;max-width:${w}px;height:${h}px">${header}${rows}</svg>`;
}

function svgRiskBars(risks) {
  const barH=24, pl=136, pr=52, pt=4, pb=4, w=520, pw=w-pl-pr, h=risks.length*barH+pt+pb;
  const rows=risks.map((r,i)=>{
    const y=pt+i*barH, sc=r.score||0, bw=sc*pw;
    const col=sc>=0.65?'#b91c1c':sc>=0.45?'#d29922':'#238636';
    return `<rect x="${pl}" y="${y+4}" width="${pw}" height="${barH-8}" fill="#21262d" rx="3"/>
    <rect x="${pl}" y="${y+4}" width="${bw.toFixed(1)}" height="${barH-8}" fill="${col}" rx="3" opacity="0.8"/>
    <text x="${pl-4}" y="${y+barH/2}" text-anchor="end" dominant-baseline="middle" font-size="11" fill="#c9d1d9">${r.name}</text>
    <text x="${(pl+Math.max(bw,1)+4).toFixed(1)}" y="${y+barH/2}" dominant-baseline="middle" font-size="10" fill="${col}">${(sc*100).toFixed(0)}%</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;max-width:${w}px;height:${h}px">${rows}</svg>`;
}

    return`<tr><td><strong style="font-family:monospace">${m.ticker}</strong></td><td>${persBar}</td><td style="color:${ac};font-weight:600;white-space:nowrap">${alpha}</td><td style="color:${hrc};font-weight:600">${hr}</td><td style="color:#8b949e">${m.resolved_signals!=null?m.resolved_signals:'—'}</td></tr>`;

// PORTFOLIOS VIEW
function _portMultiLine(ports,w,h){
  const keys=Object.keys(ports);
  const colors={max_edge:'#58a6ff',bull_case:'#3fb950',defensive:'#e3b341'};
  const all_dates=new Set();
  keys.forEach(k=>(ports[k].history||[]).forEach(d=>all_dates.add(d.date)));
  const dates=[...all_dates].sort();
  if(dates.length<2)return'<div style="color:#6e7681;text-align:center;padding:30px;font-size:12px">Not enough history to chart</div>';
  const series={};
  keys.forEach(k=>{
    const hm={};
    (ports[k].history||[]).forEach(d=>{hm[d.date]=d.return_pct;});
    series[k]=dates.map(d=>hm[d]!=null?hm[d]:null);
  });
  let mn=0,mx=0;
  keys.forEach(k=>series[k].forEach(v=>{if(v!=null){mn=Math.min(mn,v);mx=Math.max(mx,v);}}));
  const pad=Math.max((mx-mn)*0.12,0.5);
  mn-=pad;mx+=pad;
  const range=mx-mn||1;
  const pl=48,pr=64,pt=16,pb=22,pw=w-pl-pr,ph=h-pt-pb;
  const cx=i=>pl+i/(Math.max(dates.length-1,1))*pw;
  const cy=v=>pt+ph-(v-mn)/range*ph;
  const zY=cy(0).toFixed(1);
  let paths='',endDots='';
  keys.forEach(k=>{
    const clr=colors[k]||'#8b949e';
    const pts=[];
    series[k].forEach((v,i)=>{if(v!=null)pts.push(`${cx(i).toFixed(1)},${cy(v).toFixed(1)}`);});
    if(pts.length<2)return;
    paths+=`<polyline points="${pts.join(' ')}" fill="none" stroke="${clr}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>`;
    const last=series[k].filter(v=>v!=null).pop();
    if(last!=null){
      endDots+=`<circle cx="${cx(dates.length-1).toFixed(1)}" cy="${cy(last).toFixed(1)}" r="3.5" fill="${clr}"/>`;
      endDots+=`<text x="${(pl+pw+5).toFixed(1)}" y="${cy(last).toFixed(1)}" dominant-baseline="middle" font-size="10" font-weight="600" fill="${clr}">${last>=0?'+':''}${last.toFixed(1)}%</text>`;
    }
  });
  const xi=[0,Math.floor((dates.length-1)/2),dates.length-1];
  const xL=xi.map(i=>`<text x="${cx(i).toFixed(1)}" y="${pt+ph+14}" text-anchor="middle" font-size="9" fill="#6e7681">${dates[i]?dates[i].slice(5):''}</text>`).join('');
  const yVals=[mn+range*0.25,mn+range*0.5,mn+range*0.75];
  const yG=yVals.map(v=>`<line x1="${pl}" y1="${cy(v).toFixed(1)}" x2="${pl+pw}" y2="${cy(v).toFixed(1)}" stroke="#21262d"/>`).join('');
  const yL=yVals.map(v=>`<text x="${pl-4}" y="${cy(v).toFixed(1)}" text-anchor="end" dominant-baseline="middle" font-size="9" fill="#4a5568">${v>=0?'+':''}${v.toFixed(1)}%</text>`).join('');
  return`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;display:block">
    ${yG}<line x1="${pl}" y1="${zY}" x2="${pl+pw}" y2="${zY}" stroke="#30363d" stroke-dasharray="3,2"/>
    ${yL}${paths}${endDots}${xL}
  </svg>`;
}

    +'<p style="color:#8b949e">The current analog regime favors broad positive edge. Check the risk profile for tail risks.</p>'
    +_qChips(['Show risk profile','What could reverse the trend?'])+'</div>';
  return '<div class="card">'+_qHead('Negative-Edge Signals',stocks.length+' stocks with bearish conditional edge')
    +_qTickerTable(stocks)
    +_qChips(['Show defensive stocks','Risk profile','Reversal risk'])+'</div>';
}

function _qHighConf(){
  return _qTopStocks('High Confidence Signals','Ranked by hit_rate × log(n_obs) — strongest statistical backing',null,
    function(a,b){var sa=(a.hit_rate||0)*Math.log(Math.max(a.n_obs||1,1));var sb=(b.hit_rate||0)*Math.log(Math.max(b.n_obs||1,1));return sb-sa;},10);
}

function _qHorizon(q){
  var ql=q.toLowerCase();
  var h='20d';
  if(/\b5d?\b|5.day/.test(ql))h='5d';
  else if(/\b60d?\b|60.day|medium/.test(ql))h='60d';
  else if(/\b120d?\b|120.day|long/.test(ql))h='120d';
  return _qTopStocks('Top Signals — '+h+' Horizon','Stocks with '+h+' horizon, ranked by edge',
    function(s){return s.horizon===h;},null,12);
}

function _qFallback(q){
  var spy=S.spy;
  var topSec=S.sectors.filter(function(s){return s.name!=='Unknown';}).slice(0,3).map(function(s){return s.name;}).join(', ');
  var sc=S.risks.length?S.risks.reduce(function(a,b){return a+(b.score||0);},0)/S.risks.length:0;
  return '<div class="card">'+_qHead('Market Overview','Snapshot as of '+S.generated)
    +'<p style="color:#8b949e;font-size:13px;margin-bottom:14px">Couldn\'t match a specific intent for "'+q+'". Here\'s a quick state-of-play:</p>'
    +'<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px">'
    +'<div><div style="color:#6e7681;font-size:11px">Regime</div><div style="font-size:18px;font-weight:700;color:#f0f6fc">'+spy.regime+'</div></div>'
    +'<div><div style="color:#6e7681;font-size:11px">Top Sectors</div><div style="font-size:13px;color:#c9d1d9;max-width:200px">'+topSec+'</div></div>'
    +'<div><div style="color:#6e7681;font-size:11px">Composite Risk</div><div style="font-size:18px;font-weight:700;color:'+(sc>=0.65?'#f85149':sc>=0.45?'#e3b341':'#3fb950')+'">'+(sc*100).toFixed(0)+'/100</div></div>'
    +'</div>'
    +_qChips(['What\'s the market regime?','Top stocks by edge','Show risk profile','Historical analogs','Client meeting summary','What sectors lead?'])
    +'</div>';
}

// ── dispatcher ────────────────────────────────────────────────────────────────
function _rdQueryEngine(q){
  var ql=q.toLowerCase().trim();
  // 1. Ticker detection — exact word match against S.stocks
  var words=q.toUpperCase().replace(/[^A-Z0-9 ]/g,' ').split(/\s+/);
  var tkList=S.stocks.map(function(s){return s.ticker;});
  for(var wi=0;wi<words.length;wi++){if(words[wi].length>=1&&tkList.indexOf(words[wi])!==-1){return _qTicker(words[wi]);}}
  // 2. Sector name match
  var knownSectors=S.sectors.filter(function(s){return s.name&&s.name!=='Unknown';});
  for(var si=0;si<knownSectors.length;si++){
    var sn=knownSectors[si].name.toLowerCase();
    if(ql.indexOf(sn)!==-1){
      if(/all sector|list sector|show sector|every sector|compare sector/.test(ql))return _qAllSectors();
      return _qSector(knownSectors[si].name);
    }
  }
  // 3. Keyword intents
  if(/regime|market condition|bull.?market|bear.?market|phase|current market|how is.*market|what.*market/.test(ql))return _qRegime();
  if(/all sector|list sector|show sector|every sector|compare sector|sector overview|which sector/.test(ql))return _qAllSectors();
  if(/defens|safe stock|conserv|low.?risk stock|stable stock|healthcare|utilities|staple/.test(ql))return _qDefensive();
  if(/bearish|avoid|worst stock|underperform|negative edge|short|sell/.test(ql))return _qBearish();
  if(/high.?conf|reliable|conviction|consistent|most certain|best signal/.test(ql))return _qHighConf();
  if(/\b5d\b|5.day|\b60d\b|60.day|\b120d\b|120.day|horizon|short.term|medium.term|long.term/.test(ql))return _qHorizon(q);
  if(/risk|downside|danger|threat|worry|concern|adverse|tail|elevat|drawdown/.test(ql))return _qRisk();
  if(/analog|histor|similar|precedent|past|before|comparable|period/.test(ql))return _qAnalog();
  if(/signal|cross.asset|bond|treasury|vix|gold|dollar|oil|credit|copper|nasdaq|russell/.test(ql))return _qSignals();
  if(/summary|brief|overview|plain|explain|tldr|bottom.line|thesis|client|meeting|simple|tell me/.test(ql))return _qNarrative();
  if(/top|best|strongest|highest|leading|good pick|what.?should|buy|long|pick/.test(ql))return _qTopStocks();
  return _qFallback(q);
}

// ── Question log (daily wishlist) ─────────────────────────────────────────────
var RD_LOG_KEY='rd-question-log';
function _rdSaveQuestion(q){
  var log=[];
  try{log=JSON.parse(localStorage.getItem(RD_LOG_KEY)||'[]');}catch(e){}
  var now=new Date(),date=now.toISOString().slice(0,10);
  log.push({q:q,ts:now.toISOString().slice(11,16),date:date});
  if(log.length>500)log=log.slice(-500);
  try{localStorage.setItem(RD_LOG_KEY,JSON.stringify(log));}catch(e){}
}
function _rdLoadLog(){
  try{return JSON.parse(localStorage.getItem(RD_LOG_KEY)||'[]');}catch(e){return[];}
}
window._rdClearDay=function(date){
  var log=_rdLoadLog().filter(function(e){return e.date!==date;});
  try{localStorage.setItem(RD_LOG_KEY,JSON.stringify(log));}catch(e){}
  _rdRenderWishlist();
};
window._rdClearAll=function(){
  try{localStorage.removeItem(RD_LOG_KEY);}catch(e){}
  _rdRenderWishlist();
};
window._rdExportLog=function(){
  var log=_rdLoadLog();
  if(!log.length){alert('No questions logged yet.');return;}
  var byDate={};
  log.forEach(function(e){if(!byDate[e.date])byDate[e.date]=[];byDate[e.date].push(e);});
  var lines=['# Regime Desk — Daily Question Log\n'];
  Object.keys(byDate).sort().reverse().forEach(function(d){
    lines.push('## '+d);
    byDate[d].forEach(function(e){lines.push('- '+(e.ts?'['+e.ts+'] ':'')+e.q);});
    lines.push('');
  });
  var text=lines.join('\n');
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){
      var btn=document.getElementById('rd-export-btn');
      if(btn){btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy Log';},2000);}
    });
  }else{prompt('Copy this log:',text);}
};
window._rdDownloadLog=function(){
  var log=_rdLoadLog();
  if(!log.length){alert('No questions logged yet.');return;}
  var json=JSON.stringify(log,null,2);
  var a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(json);
  a.download='question_log.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
};
function _rdRenderWishlist(){
  var el=document.getElementById('rd-wishlist-body');if(!el)return;
  var log=_rdLoadLog();
  if(!log.length){
    el.innerHTML='<div style="color:#6e7681;padding:10px 0;font-size:13px">No questions logged yet — ask something above to start building your daily log.</div>';
    return;
  }
  var byDate={};
  log.forEach(function(e){if(!byDate[e.date])byDate[e.date]=[];byDate[e.date].push(e);});
  var today=new Date().toISOString().slice(0,10);
  var html='';
  Object.keys(byDate).sort().reverse().forEach(function(d){
    var entries=byDate[d];
    var isToday=d===today;
    var label=isToday?'Today — '+d:d;
    var count=entries.length;
    html+='<div style="margin-bottom:18px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
      +'<span style="font-size:12px;font-weight:600;color:'+(isToday?'#58a6ff':'#8b949e')+'">'+label
        +'<span style="color:#6e7681;font-weight:400;margin-left:6px">'+count+' question'+(count===1?'':'s')+'</span></span>'
      +'<button onclick="window._rdClearDay(\''+d+'\')" style="background:none;border:1px solid #30363d;color:#6e7681;border-radius:4px;padding:1px 8px;cursor:pointer;font-size:11px">Clear day</button>'
      +'</div>'
      +entries.map(function(e){
        return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #21262d">'
          +(e.ts?'<span style="color:#6e7681;font-size:11px;min-width:38px">'+e.ts+'</span>':'')
          +'<span style="flex:1;color:#c9d1d9;font-size:13px;cursor:pointer" '
          +'onclick="window._rdAsk(\''+e.q.replace(/'/g,'').replace(/"/g,'')+'\')" '
          +'onmouseover="this.style.color=\'#58a6ff\'" onmouseout="this.style.color=\'#c9d1d9\'">'+e.q+'</span>'
          +'</div>';
      }).join('')
      +'</div>';
  });
  el.innerHTML=html;
}
window._rd_postrender_ask=function(){_rdRenderWishlist();};

// ── Ask view shell ────────────────────────────────────────────────────────────
window._rdRefreshHistory=function(){
  var el=document.getElementById('rd-ask-history');
  if(!el||!_askHistory.length)return;
  el.innerHTML='<div class="card" style="margin-top:14px"><div style="color:#6e7681;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Query History</div>'
    +_askHistory.map(function(q,i){return '<div style="padding:6px 0;border-bottom:1px solid #21262d;cursor:pointer;font-size:13px;color:#c9d1d9" onclick="window._rdAsk(\''+q.replace(/'/g,'').replace(/"/g,'')+'\')" onmouseover="this.style.color=\'#58a6ff\'" onmouseout="this.style.color=\'#c9d1d9\'">'
      +'<span style="color:#6e7681;font-size:11px;margin-right:8px">'+(i+1)+'.</span>'+q+'</div>';}).join('')
    +'</div>';
};
window._rdAsk=function(q){
  q=(q||'').trim();if(!q)return;
  var inp=document.getElementById('rd-ask-input');if(inp)inp.value=q;
  var resp=document.getElementById('rd-ask-response');if(!resp)return;
  _askHistory.unshift(q);if(_askHistory.length>8)_askHistory.pop();
  _rdSaveQuestion(q);
  resp.innerHTML='<div style="display:flex;align-items:center;gap:8px;padding:16px 0;color:#8b949e;font-size:13px">'
    +'<span class="rd-dot"></span><span class="rd-dot" style="animation-delay:.18s"></span><span class="rd-dot" style="animation-delay:.36s"></span>'
    +'<span style="margin-left:4px">Analyzing...</span></div>';
  setTimeout(function(){
    resp.innerHTML=_rdQueryEngine(q);
    window._rdRefreshHistory();
    _rdRenderWishlist();
  },420);
};

function renderAsk(){
  var chips=['What\'s the current market regime?','Show top sectors','Top 5 stocks by edge','What are the key risks?','What do historical analogs say?','Give me a client summary','What should I avoid?','Show cross-asset signals'];
  var chipHtml=chips.map(function(c){return '<button class="rd-chip" onclick="window._rdAsk(\''+c.replace(/'/g,'')+'\')" >'+c+'</button>';}).join('');
  return '<div class="card" style="margin-bottom:0">'
    +'<h2>Ask the Dashboard <span style="font-size:12px;color:#6e7681;font-weight:400;margin-left:6px">— powered by snapshot data · no internet required</span></h2>'
    +'<p style="color:#8b949e;font-size:13px;margin-bottom:14px">Ask about any ticker, sector, regime, risk, or outlook. Type or click a suggestion.</p>'
    +'<div style="display:flex;gap:8px;margin-bottom:12px">'
    +'<input id="rd-ask-input" type="text" placeholder="e.g. NVDA  ·  technology stocks  ·  what\'s the risk profile?" '
    +'style="flex:1;background:#21262d;border:1px solid #30363d;color:#f0f6fc;padding:9px 14px;border-radius:8px;font-size:14px;outline:none;min-width:0" '
    +'onkeydown="if(event.key===\'Enter\')window._rdAsk(this.value)" '
    +'onfocus="this.style.borderColor=\'#58a6ff\'" onblur="this.style.borderColor=\'#30363d\'"/>'
    +'<button onclick="window._rdAsk(document.getElementById(\'rd-ask-input\').value)" '
    +'style="background:#238636;border:none;color:#fff;padding:9px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;flex-shrink:0">Ask</button>'
    +'</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:0">'+chipHtml+'</div></div>'
    +'<div id="rd-ask-response" style="margin-top:12px"></div>'
    +'<div id="rd-ask-history"></div>'
    +'<div class="card" style="margin-top:16px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #30363d">'
    +'<h2 style="margin:0;border:none;padding:0">Daily Question Log</h2>'
    +'<div style="display:flex;gap:8px">'
    +'<button id="rd-export-btn" onclick="window._rdExportLog()" style="background:#21262d;border:1px solid #30363d;color:#8b949e;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px">Copy Log</button>'
    +'<button onclick="window._rdDownloadLog()" style="background:#21262d;border:1px solid #30363d;color:#8b949e;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px" title="Download question_log.json — save to regime-desk/data/ then run run_daily.bat">Download JSON</button>'
    +'<button onclick="window._rdClearAll()" style="background:none;border:1px solid #30363d;color:#6e7681;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px">Clear All</button>'
    +'</div></div>'
    +'<div id="rd-wishlist-body"></div>'
    +'</div>'
    +'<footer>All analysis is computed from the locally cached snapshot — data as of '+S.generated+'. Keyboard shortcut: press <kbd style="background:#21262d;border:1px solid #30363d;border-radius:3px;padding:1px 5px;font-size:11px">a</kbd></footer>';
}

// ── Ticker hover tooltip ──────────────────────────────────────────────────────
(function(){
  var tip=document.getElementById('rd-tip');
  if(!tip){tip=document.createElement('div');tip.id='rd-tip';document.body.appendChild(tip);}
  tip.style.display='none';
  var _cx=0,_cy=0;

  function _spark(closes){
    if(!closes||closes.length<2)return '';
    var mn=Math.min.apply(null,closes),mx=Math.max.apply(null,closes);
    var rng=mx-mn||1,W=238,H=30,n=closes.length;
    var pts=closes.map(function(v,i){
      return ((i/(n-1))*W).toFixed(1)+','+(H-2-((v-mn)/rng)*(H-6)).toFixed(1);
    }).join(' ');
    var col=closes[closes.length-1]>=closes[0]?'#3fb950':'#f85149';
    return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="display:block;margin-top:5px;overflow:visible">'
      +'<polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
      +'</svg>';
  }

  function pos(cx,cy){
    var tw=tip.offsetWidth||260,th=tip.offsetHeight||180;
    var lx=cx+14,ly=cy+14;
    if(lx+tw>window.innerWidth-8)lx=cx-tw-14;
    if(ly+th>window.innerHeight-8)ly=cy-th-14;
    tip.style.left=lx+'px';tip.style.top=ly+'px';
  }

  function show(ticker,cx,cy){
    _cx=cx;_cy=cy;
    var st=(S.stocks||[]).find(function(s){return s.ticker===ticker;})
        ||(S.all_signals||[]).find(function(s){return s.ticker===ticker;});
    if(!st)return;
    var ec=st.edge>=0?'#3fb950':'#f85149';
    var sec=st.sector&&st.sector!=='Unknown'?st.sector:'—';
    var nameRow=st.name&&st.name!==st.ticker
      ?'<div style="color:#8b949e;font-size:11px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+st.name+'</div>':'';

    var priceBlock='';
    if(st.price!=null&&st.week_closes&&st.week_closes.length>=2){
      var pc=st.change_pct>=0?'#3fb950':'#f85149';
      var ps=st.change_pct>=0?'+':'';
      var wkLo=Math.min.apply(null,st.week_closes),wkHi=Math.max.apply(null,st.week_closes);
      var wkRng=wkHi-wkLo||1;
      var wkPos=Math.max(0,Math.min(100,((st.price-wkLo)/wkRng)*100));
      var rangeBar='<div style="margin-top:5px">'
        +'<div style="display:flex;justify-content:space-between;color:#6e7681;font-size:9px;margin-bottom:2px"><span>$'+wkLo.toFixed(2)+'</span><span style="color:#484f58">7d range</span><span>$'+wkHi.toFixed(2)+'</span></div>'
        +'<div style="position:relative;height:4px;background:#21262d;border-radius:2px"><div style="position:absolute;left:'+wkPos.toFixed(0)+'%;top:-2px;width:2px;height:8px;background:'+pc+';transform:translateX(-1px);border-radius:1px"></div></div>'
        +'</div>';
      priceBlock='<div style="border-top:1px solid #21262d;border-bottom:1px solid #21262d;margin:6px 0;padding:4px 0">'
        +'<div style="display:flex;align-items:baseline;gap:8px">'
        +'<span style="color:#f0f6fc;font-size:15px;font-weight:700">$'+st.price.toFixed(2)+'</span>'
        +'<span style="color:'+pc+';font-size:12px;font-weight:600">'+ps+(st.change_pct*100).toFixed(2)+'%</span>'
        +'<span style="color:#484f58;font-size:10px">today</span>'
        +'</div>'
        +_spark(st.week_closes)
        +rangeBar
        +'</div>';
    }

    tip.innerHTML=''
      +'<div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">'
      +'<img src="https://assets.parqet.com/logos/symbol/'+ticker+'?format=jpg" width="22" height="22" '
      +'style="border-radius:4px;background:#fff;border:1px solid #30363d;object-fit:contain;flex-shrink:0" '
      +'onerror="this.style.display=\'none\'" loading="lazy">'
      +'<strong style="color:#f0f6fc;font-size:14px">'+ticker+'</strong>'
      +'<span style="color:#6e7681;font-size:11px;margin-left:2px">'+sec+'</span>'
      +'</div>'
      +nameRow
      +priceBlock
      +'<div style="display:flex;gap:16px;padding-top:2px">'
      +'<div><div style="color:#6e7681;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">Edge</div>'
      +'<div style="color:'+ec+';font-weight:600;font-size:13px">'+(st.edge>=0?'+':'')+(st.edge*100).toFixed(1)+'%</div></div>'
      +'<div><div style="color:#6e7681;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">Median</div>'
      +'<div style="color:#c9d1d9;font-size:13px">'+(st.p50>=0?'+':'')+(st.p50*100).toFixed(1)+'%</div></div>'
      +'<div><div style="color:#6e7681;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">Window</div>'
      +'<div style="color:#c9d1d9;font-size:13px">'+(st.horizon||'20d')+'</div></div>'
      +'<div><div style="color:#6e7681;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">Hits</div>'
      +'<div style="color:#c9d1d9;font-size:13px">'+((st.hit_rate||0)*100).toFixed(0)+'%</div></div>'
      +'</div>';
    pos(cx,cy);
    tip.style.display='block';
  }

  function hide(){tip.style.display='none';}
  document.addEventListener('mouseover',function(e){
    var el=e.target.closest?e.target.closest('[data-ticker]'):null;
    if(el)show(el.dataset.ticker,e.clientX,e.clientY);
    else hide();
  });
  document.addEventListener('mousemove',function(e){
    _cx=e.clientX;_cy=e.clientY;
    if(tip.style.display==='block')pos(_cx,_cy);
  });
  document.addEventListener('mouseout',function(e){
    var el=e.target.closest?e.target.closest('[data-ticker]'):null;
    if(el&&!el.contains(e.relatedTarget))hide();
  });
})();
})();
</script>
