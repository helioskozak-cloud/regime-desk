    +'<input id="rd-ask-input" type="text" placeholder="e.g. NVDA  ·  technology stocks  ·  what\'s the risk profile?" '
    +'style="flex:1;background:#21262d;border:1px solid #30363d;color:#f0f6fc;padding:9px 14px;border-radius:8px;font-size:14px;outline:none;min-width:0" '
    +'onkeydown="if(event.key===\'Enter\')window._rdAsk(this.value)" '
    +'onfocus="this.style.borderColor=\'#58a6ff\'" onblur="this.style.borderColor=\'#30363d\'"/>'
    +'<button onclick="window._rdAsk(document.getElementById(\'rd-ask-input\').value)" '
    +'style="background:#238636;border:none;color:#fff;padding:9px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;flex-shrink:0">Ask</button>'
    +'</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:0">'+chipHtml+'</div></div>'
    +'<div id="rd-ask-response" style="margin-top:12px"></div>'
    +'<div id="rd-ask-history"></div>'
    +'<div class="card" style="margin-top:16px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #30363d">'
    +'<h2 style="margin:0;border:none;padding:0">Daily Question Log</h2>'
    +'<div style="display:flex;gap:8px">'
    +'<button id="rd-export-btn" onclick="window._rdExportLog()" style="background:#21262d;border:1px solid #30363d;color:#8b949e;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px">Copy Log</button>'
    +'<button onclick="window._rdDownloadLog()" style="background:#21262d;border:1px solid #30363d;color:#8b949e;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px" title="Download question_log.json — save to regime-desk/data/ then run run_daily.bat">Download JSON</button>'
    +'<button onclick="window._rdClearAll()" style="background:none;border:1px solid #30363d;color:#6e7681;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px">Clear All</button>'
    +'</div></div>'
    +'<div id="rd-wishlist-body"></div>'
    +'</div>'
    +'<footer>All analysis is computed from the locally cached snapshot — data as of '+S.generated+'. Keyboard shortcut: press <kbd style="background:#21262d;border:1px solid #30363d;border-radius:3px;padding:1px 5px;font-size:11px">a</kbd></footer>';
}

// ── Ticker hover tooltip ──────────────────────────────────────────────────────
(function(){
  var tip=document.getElementById('rd-tip');
  if(!tip){tip=document.createElement('div');tip.id='rd-tip';document.body.appendChild(tip);}
  tip.style.display='none';
  var _cx=0,_cy=0;

  function _spark(closes){
    if(!closes||closes.length<2)return '';
    var mn=Math.min.apply(null,closes),mx=Math.max.apply(null,closes);
    var rng=mx-mn||1,W=238,H=30,n=closes.length;
    var pts=closes.map(function(v,i){
      return ((i/(n-1))*W).toFixed(1)+','+(H-2-((v-mn)/rng)*(H-6)).toFixed(1);
    }).join(' ');
    var col=closes[closes.length-1]>=closes[0]?'#3fb950':'#f85149';
    return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="display:block;margin-top:5px;overflow:visible">'
      +'<polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
      +'</svg>';
  }

  function pos(cx,cy){
    var tw=tip.offsetWidth||260,th=tip.offsetHeight||180;
    var lx=cx+14,ly=cy+14;
    if(lx+tw>window.innerWidth-8)lx=cx-tw-14;
    if(ly+th>window.innerHeight-8)ly=cy-th-14;
    tip.style.left=lx+'px';tip.style.top=ly+'px';
  }

  function show(ticker,cx,cy){
    _cx=cx;_cy=cy;
    var st=(S.stocks||[]).find(function(s){return s.ticker===ticker;})
        ||(S.all_signals||[]).find(function(s){return s.ticker===ticker;});
    if(!st)return;
    var ec=st.edge>=0?'#3fb950':'#f85149';
    var sec=st.sector&&st.sector!=='Unknown'?st.sector:'—';
    var nameRow=st.name&&st.name!==st.ticker
      ?'<div style="color:#8b949e;font-size:11px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+st.name+'</div>':'';

    var priceBlock='';
    if(st.price!=null&&st.week_closes&&st.week_closes.length>=2){
      var pc=st.change_pct>=0?'#3fb950':'#f85149';
      var ps=st.change_pct>=0?'+':'';
      var wkLo=Math.min.apply(null,st.week_closes),wkHi=Math.max.apply(null,st.week_closes);
      var wkRng=wkHi-wkLo||1;
      var wkPos=Math.max(0,Math.min(100,((st.price-wkLo)/wkRng)*100));
      var rangeBar='<div style="margin-top:5px">'
        +'<div style="display:flex;justify-content:space-between;color:#6e7681;font-size:9px;margin-bottom:2px"><span>$'+wkLo.toFixed(2)+'</span><span style="color:#484f58">7d range</span><span>$'+wkHi.toFixed(2)+'</span></div>'
        +'<div style="position:relative;height:4px;background:#21262d;border-radius:2px"><div style="position:absolute;left:'+wkPos.toFixed(0)+'%;top:-2px;width:2px;height:8px;background:'+pc+';transform:translateX(-1px);border-radius:1px"></div></div>'
        +'</div>';
      priceBlock='<div style="border-top:1px solid #21262d;border-bottom:1px solid #21262d;margin:6px 0;padding:4px 0">'
        +'<div style="display:flex;align-items:baseline;gap:8px">'
        +'<span style="color:#f0f6fc;font-size:15px;font-weight:700">$'+st.price.toFixed(2)+'</span>'
        +'<span style="color:'+pc+';font-size:12px;font-weight:600">'+ps+(st.change_pct*100).toFixed(2)+'%</span>'
        +'<span style="color:#484f58;font-size:10px">today</span>'
        +'</div>'
        +_spark(st.week_closes)
        +rangeBar
        +'</div>';
    }

    tip.innerHTML=''
      +'<div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">'
      +'<img src="https://assets.parqet.com/logos/symbol/'+ticker+'?format=jpg" width="22" height="22" '
      +'style="border-radius:4px;background:#fff;border:1px solid #30363d;object-fit:contain;flex-shrink:0" '
      +'onerror="this.style.display=\'none\'" loading="lazy">'
      +'<strong style="color:#f0f6fc;font-size:14px">'+ticker+'</strong>'
      +'<span style="color:#6e7681;font-size:11px;margin-left:2px">'+sec+'</span>'
      +'</div>'
      +nameRow
      +priceBlock
      +'<div style="display:flex;gap:16px;padding-top:2px">'
      +'<div><div style="color:#6e7681;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">Edge</div>'
      +'<div style="color:'+ec+';font-weight:600;font-size:13px">'+(st.edge>=0?'+':'')+(st.edge*100).toFixed(1)+'%</div></div>'
      +'<div><div style="color:#6e7681;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">Median</div>'
      +'<div style="color:#c9d1d9;font-size:13px">'+(st.p50>=0?'+':'')+(st.p50*100).toFixed(1)+'%</div></div>'
      +'<div><div style="color:#6e7681;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">Window</div>'
      +'<div style="color:#c9d1d9;font-size:13px">'+(st.horizon||'20d')+'</div></div>'
      +'<div><div style="color:#6e7681;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">Hits</div>'
      +'<div style="color:#c9d1d9;font-size:13px">'+((st.hit_rate||0)*100).toFixed(0)+'%</div></div>'
      +'</div>'
      +'<div style="margin-top:8px;padding-top:6px;border-top:1px solid #21262d;color:#6e7681;font-size:10px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;letter-spacing:.06em;text-transform:uppercase;line-height:1.55">'
      +  '<div style="color:#58a6ff">shift-click → news-desk ↗</div>'
      +'</div>';
    pos(cx,cy);
    tip.style.display='block';
  }

  function hide(){tip.style.display='none';}
  document.addEventListener('mouseover',function(e){
    var el=e.target.closest?e.target.closest('[data-ticker]'):null;
    if(el)show(el.dataset.ticker,e.clientX,e.clientY);
    else hide();
  });
  document.addEventListener('mousemove',function(e){
    _cx=e.clientX;_cy=e.clientY;
    if(tip.style.display==='block')pos(_cx,_cy);
  });
  document.addEventListener('mouseout',function(e){
    var el=e.target.closest?e.target.closest('[data-ticker]'):null;
    if(el&&!el.contains(e.relatedTarget))hide();
  });
  /* shift-click on any [data-ticker] element opens news-desk filtered to it */
  document.addEventListener('click',function(e){
    if(!(e.shiftKey||e.metaKey||e.ctrlKey))return;
    var el=e.target.closest?e.target.closest('[data-ticker]'):null;
    if(!el||!el.dataset.ticker)return;
    e.preventDefault();e.stopPropagation();
    window.open('https://helioskozak-cloud.github.io/news-desk/?ticker='+encodeURIComponent(el.dataset.ticker),
                '_blank','noopener,noreferrer');
  },true);
})();
})();
</script>
<div id="rd-tip"></div>
</body>
